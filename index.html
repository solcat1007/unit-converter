<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单位换算器 · Unit Converter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#fff;color:#333;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden}
#lang-btn{position:fixed;top:20px;left:20px;z-index:100;padding:8px 16px;background:#00BCD4;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;transition:background .2s}
#lang-btn:hover{background:#0097A7}
#fs-btn{position:fixed;top:20px;right:20px;z-index:100;padding:8px 16px;background:#00BCD4;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;transition:background .2s}
#fs-btn:hover{background:#0097A7}
#app{max-width:500px;width:90%;text-align:center}
h2{font-weight:400;color:#00BCD4;margin-bottom:24px;font-size:22px}
#category-tabs{display:flex;gap:4px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
.cat-tab{padding:8px 16px;border:2px solid #ddd;border-radius:20px;background:transparent;cursor:pointer;font-size:13px;color:#888;font-family:inherit;transition:all .2s}
.cat-tab.active{background:#00BCD4;color:#fff;border-color:#00BCD4}
.converter-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:center}
input[type="number"]{width:140px;padding:12px;border:2px solid #e0f7fa;border-radius:8px;font-size:18px;text-align:center;outline:none;font-family:inherit;transition:border-color .2s}
input[type="number"]:focus{border-color:#00BCD4}
.unit-select{padding:10px 12px;border:2px solid #e0f7fa;border-radius:8px;font-size:14px;font-family:inherit;outline:none;cursor:pointer;background:#fff;transition:border-color .2s}
.unit-select:focus{border-color:#00BCD4}
.swap-btn{width:40px;height:40px;border-radius:50%;border:2px solid #00BCD4;background:#fff;color:#00BCD4;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.swap-btn:hover{background:#e0f7fa}
#result-row{margin-top:16px;padding:16px;background:#f0f8f9;border-radius:10px}
#result{font-size:28px;color:#00BCD4;font-weight:300}
#formula{font-size:12px;color:#aaa;margin-top:6px}
#presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.preset-btn{padding:6px 14px;border:1px solid #e0f7fa;border-radius:14px;background:#fff;cursor:pointer;font-size:12px;color:#666;font-family:inherit;transition:all .2s}
.preset-btn:hover{background:#e0f7fa;border-color:#00BCD4}
</style>
</head>
<body>

<button id="fs-btn" onclick="toggleFS()" data-key="fsBtn">全屏</button>

<button id="lang-btn" onclick="toggleLang()" data-key="langBtn">中/EN</button>

<div id="app">
  <h2 id="title" data-key="title">单位换算器</h2>
  <div id="category-tabs">
    <button class="cat-tab active" data-cat="length" onclick="switchCat('length')" data-key="length">长度</button>
    <button class="cat-tab" data-cat="weight" onclick="switchCat('weight')" data-key="weight">重量</button>
    <button class="cat-tab" data-cat="temperature" onclick="switchCat('temperature')" data-key="temp">温度</button>
    <button class="cat-tab" data-cat="area" onclick="switchCat('area')" data-key="area">面积</button>
    <button class="cat-tab" data-cat="speed" onclick="switchCat('speed')" data-key="speed">速度</button>
    <button class="cat-tab" data-cat="data" onclick="switchCat('data')" data-key="data">存储</button>
  </div>

  <div class="converter-row">
    <input type="number" id="input-val" value="1" oninput="convert()" step="any">
    <select id="unit-from" class="unit-select" onchange="convert()"></select>
    <button class="swap-btn" onclick="swapUnits()">&#8644;</button>
    <select id="unit-to" class="unit-select" onchange="convert()"></select>
  </div>

  <div id="result-row">
    <div id="result">--</div>
    <div id="formula"></div>
  </div>

  <div id="presets"></div>
</div>

<script>
const i18n = {
  zh: {
    langBtn:'中/EN', title:'单位换算器',
    length:'长度', weight:'重量', temp:'温度', area:'面积', speed:'速度', data:'存储',
    meter:'米(m)', km:'千米(km)', cm:'厘米(cm)', mm:'毫米(mm)', inch:'英寸(in)', foot:'英尺(ft)', mile:'英里(mi)',
    kg:'千克(kg)', g:'克(g)', mg:'毫克(mg)', ton:'吨(t)', lb:'磅(lb)', oz:'盎司(oz)',
    celsius:'摄氏度(°C)', fahrenheit:'华氏度(°F)', kelvin:'开尔文(K)',
    sqm:'平方米(m²)', sqkm:'平方千米(km²)', ha:'公顷(ha)', acre:'英亩', sqft:'平方英尺(ft²)',
    ms:'米/秒(m/s)', kmh:'千米/时(km/h)', mph:'英里/时(mph)', knot:'节(kn)',
    byte:'字节(B)', kb:'千字节(KB)', mb:'兆字节(MB)', gb:'吉字节(GB)', tb:'太字节(TB)',
    presets:'常用值: '
  },
  en: {
    langBtn:'中/EN', title:'Unit Converter',
    length:'Length', weight:'Weight', temp:'Temp', area:'Area', speed:'Speed', data:'Data',
    meter:'Meter(m)', km:'Kilometer(km)', cm:'Centimeter(cm)', mm:'Millimeter(mm)', inch:'Inch(in)', foot:'Foot(ft)', mile:'Mile(mi)',
    kg:'Kilogram(kg)', g:'Gram(g)', mg:'Milligram(mg)', ton:'Ton(t)', lb:'Pound(lb)', oz:'Ounce(oz)',
    celsius:'Celsius(°C)', fahrenheit:'Fahrenheit(°F)', kelvin:'Kelvin(K)',
    sqm:'Square Meter(m²)', sqkm:'Square Kilometer(km²)', ha:'Hectare(ha)', acre:'Acre', sqft:'Square Foot(ft²)',
    ms:'m/s', kmh:'km/h', mph:'mph', knot:'Knot(kn)',
    byte:'Byte(B)', kb:'Kilobyte(KB)', mb:'Megabyte(MB)', gb:'Gigabyte(GB)', tb:'Terabyte(TB)',
    presets:'Presets: '
  }
};
let lang = 'zh';
let t = i18n[lang];
let currentCat = 'length';

const categories = {
  length: {
    units: ['meter','km','cm','mm','inch','foot','mile'],
    toBase: { meter:1, km:1000, cm:0.01, mm:0.001, inch:0.0254, foot:0.3048, mile:1609.344 },
    presets: [1,10,100,0.5,3.28]
  },
  weight: {
    units: ['kg','g','mg','ton','lb','oz'],
    toBase: { kg:1, g:0.001, mg:1e-6, ton:1000, lb:0.453592, oz:0.0283495 },
    presets: [1,5,100,0.5,2.205]
  },
  temperature: {
    units: ['celsius','fahrenheit','kelvin'],
    presets: [0,100,37,-40,273.15]
  },
  area: {
    units: ['sqm','sqkm','ha','acre','sqft'],
    toBase: { sqm:1, sqkm:1e6, ha:10000, acre:4046.86, sqft:0.092903 },
    presets: [1,100,1000,2.471,10.764]
  },
  speed: {
    units: ['ms','kmh','mph','knot'],
    toBase: { ms:1, kmh:0.277778, mph:0.44704, knot:0.514444 },
    presets: [1,100,60,10]
  },
  data: {
    units: ['byte','kb','mb','gb','tb'],
    toBase: { byte:1, kb:1024, mb:1048576, gb:1073741824, tb:1099511627776 },
    presets: [1,1024,1048576,1000,8]
  }
};

function toggleLang(){ lang=lang==='zh'?'en':'zh'; t=i18n[lang]; updateUI(); }
function updateUI(){
  document.querySelectorAll('[data-key]').forEach(el=>{
    let k=el.dataset.key;
    if(el.tagName==='BUTTON'||el.tagName==='H2') el.textContent=t[k]||el.textContent;
  });
  popUnits();
}

function switchCat(cat){
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  popUnits();
}

function popUnits(){
  let cat = categories[currentCat];
  let fu=document.getElementById('unit-from'), tu=document.getElementById('unit-to');
  fu.innerHTML=''; tu.innerHTML='';
  cat.units.forEach(u=>{
    let opt = document.createElement('option'); opt.value=u; opt.textContent=t[u]; fu.appendChild(opt);
  });
  cat.units.forEach(u=>{
    let opt = document.createElement('option'); opt.value=u; opt.textContent=t[u]; tu.appendChild(opt);
  });
  if(currentCat==='length'||currentCat==='speed'){ fu.value=cat.units[0]; tu.value=cat.units[1]; }
  else if(currentCat==='temperature'){ fu.value='celsius'; tu.value='fahrenheit'; }
  else { fu.value=cat.units[0]; tu.value=cat.units[2]||cat.units[1]; }

  // presets
  let pdiv=document.getElementById('presets');
  pdiv.innerHTML = '<span style="font-size:12px;color:#aaa;margin-right:4px">'+t.presets+'</span>';
  cat.presets.forEach(v=>{
    let btn=document.createElement('button'); btn.className='preset-btn';
    btn.textContent=v; btn.onclick=()=>{ document.getElementById('input-val').value=v; convert(); };
    pdiv.appendChild(btn);
  });
  convert();
}

function swapUnits(){
  let fu=document.getElementById('unit-from'), tu=document.getElementById('unit-to');
  [fu.value, tu.value] = [tu.value, fu.value];
  convert();
}

function convertTemperature(val, from, to){
  let celsius;
  if(from==='celsius') celsius=val;
  else if(from==='fahrenheit') celsius=(val-32)*5/9;
  else celsius=val-273.15;
  if(to==='celsius') return celsius;
  if(to==='fahrenheit') return celsius*9/5+32;
  return celsius+273.15;
}

function convert(){
  let val=parseFloat(document.getElementById('input-val').value);
  if(isNaN(val)){ document.getElementById('result').textContent='--'; document.getElementById('formula').textContent=''; return; }
  let from=document.getElementById('unit-from').value;
  let to=document.getElementById('unit-to').value;
  let result;
  if(currentCat==='temperature'){
    result = convertTemperature(val, from, to);
  } else {
    let cat = categories[currentCat];
    let baseVal = val * cat.toBase[from];
    result = baseVal / cat.toBase[to];
  }
  let rStr = Number.isInteger(result) ? result.toString() : parseFloat(result.toPrecision(10)).toString();
  document.getElementById('result').textContent = rStr + ' ' + t[to].split('(')[0]?.trim() || '';
  document.getElementById('formula').textContent = val + ' ' + t[from].split('(')[0]?.trim() + ' = ' + rStr;
}

popUnits();

function toggleFS(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}
</script>
</body>
</html>
